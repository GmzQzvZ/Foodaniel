<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-label="Receta quemada - 404">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- humo -->
  <g opacity="0.35" filter="url(#soft)">
    <path d="M190 200c50-40 110-35 150 0s110 35 160 0 110-35 150 0 90 45 130 10" fill="none" stroke="#94a3b8" stroke-width="18" stroke-linecap="round"/>
    <path d="M220 155c40-30 90-25 120 0s90 25 130 0 90-25 120 0 75 35 110 10" fill="none" stroke="#94a3b8" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- plato -->
  <ellipse cx="480" cy="395" rx="260" ry="76" fill="#0f172a" opacity="0.9"/>
  <ellipse cx="480" cy="390" rx="240" ry="62" fill="#111827"/>
  <ellipse cx="480" cy="390" rx="190" ry="38" fill="#0b1220"/>

  <!-- sartén quemada -->
  <g>
    <ellipse cx="430" cy="310" rx="160" ry="74" fill="#0b0f1a" stroke="#334155" stroke-width="6"/>
    <ellipse cx="430" cy="310" rx="130" ry="52" fill="#0a0d14" opacity="0.9"/>

    <!-- mango -->
    <path d="M565 290c90-30 155-10 190 18" fill="none" stroke="#334155" stroke-width="18" stroke-linecap="round"/>
    <path d="M565 290c90-30 155-10 190 18" fill="none" stroke="#0f172a" stroke-width="10" stroke-linecap="round"/>

    <!-- manchas -->
    <g opacity="0.55">
      <circle cx="370" cy="300" r="14" fill="#1f2937"/>
      <circle cx="420" cy="332" r="10" fill="#1f2937"/>
      <circle cx="460" cy="292" r="8" fill="#1f2937"/>
      <circle cx="320" cy="318" r="9" fill="#1f2937"/>
    </g>
  </g>

  <!-- llama -->
  <g transform="translate(0,-8)">
    <path d="M430 330c-20-28-14-62 10-84 7 19 24 26 28 54 16-16 19-38 12-58 36 16 54 60 35 92-16 28-55 44-85 24z" fill="url(#flame)"/>
    <path d="M438 332c-10-15-7-34 6-46 5 10 14 14 16 29 9-9 10-20 6-30 18 8 26 32 16 48-7 12-27 20-44  -1z" fill="#fcd34d" opacity="0.95"/>
