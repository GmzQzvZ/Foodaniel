<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
  <link rel="icon" type="image/svg+xml" href="/FrontEnd/img/favicon.svg" />
<title>Admin - Login</title>
  <link rel="stylesheet" href="/FrontEnd/admin/css/style-ad.css" />
  <link rel="stylesheet" href="/FrontEnd/admin/css/dashboard.css" />
</head>
<body class="admin-login-body">
    <div class="admin-login-container">
        <h1>Panel de Administración</h1>
        <form id="adminLoginForm" class="admin-login-form">
            <div class="form-group">
                <label for="adminEmail">Correo</label>
                <input type="email" id="adminEmail" required />
            </div>
            <div class="form-group">
                <label for="adminPassword">Contraseña</label>
                <input type="password" id="adminPassword" required />
            </div>
            <button type="submit" class="btn-primary">Ingresar</button>
            <p id="adminLoginError" class="error-message" style="display:none;">Credenciales inválidas</p>
        </form>
    </div>

    <script src="/FrontEnd/admin/js/admin.js"></script> 
</body>
</html>
