<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{SUBJECT}}</title>
<style>
  body { margin:0; padding:0; background:#0d0d0d; font-family:Arial,Helvetica,sans-serif; color:#fff; }
  .email-container { max-width:560px; margin:24px auto; background:#111; border:1px solid #222; border-radius:14px; overflow:hidden; }
  .header { padding:24px; background:linear-gradient(135deg,#111,#333); text-align:center; }
  .content { padding:24px; color:#e5e7eb; line-height:1.6; }
  .content h2 { margin-top:0; }
  .message { white-space:pre-wrap; }
  .footer { padding:16px 24px; color:#9ca3af; font-size:12px; border-top:1px solid #222; }
</style>
</head>
<body>
  <div class="email-container">
    <div class="header"><h1>Foodaniell</h1></div>
    <div class="content">
      <p>Hola {{CLIENT_NAME}},</p>
      <h2>{{SUBJECT}}</h2>
      <div class="message">{{MESSAGE}}</div>
    </div>
    <div class="footer">Este mensaje fue generado automáticamente. © {{YEAR}} Foodaniell.</div>
  </div>
</body>
</html>
