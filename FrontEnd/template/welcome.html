<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bienvenido a Foodaniell</title>
<style>
  body { margin:0; padding:0; background:#0d0d0d; font-family:Arial,Helvetica,sans-serif; color:#fff; }
  .email-container { max-width:560px; margin:24px auto; background:#111; border:1px solid #222; border-radius:14px; overflow:hidden; }
  .header { padding:24px; background:linear-gradient(135deg,#111,#333); text-align:center; }
  .content { padding:24px; color:#e5e7eb; line-height:1.6; }
  .title { margin:0 0 10px; }
  .footer { padding:16px 24px; color:#9ca3af; font-size:12px; border-top:1px solid #222; }
</style>
</head>
<body>
  <div class="email-container">
    <div class="header"><h1>Foodaniell</h1></div>
    <div class="content">
      <h2 class="title">¡Hola, {{CLIENT_NAME}}!</h2>
      <p>Gracias por registrarte en Foodaniell.</p>
      <p>Desde ahora podrás descubrir recetas, videos y recursos creados para mejorar tu cocina día a día.</p>
      <p>Nos alegra tenerte aquí.</p>
    </div>
    <div class="footer">© {{YEAR}} Foodaniell. Todos los derechos reservados.</div>
  </div>
</body>
</html>
